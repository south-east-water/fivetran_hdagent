name: Full Upstream Sync

on:
  schedule:
    - cron: '0 4 * * 3'
  workflow_dispatch:

jobs:
  sync-all:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check if it is the 3rd Wednesday
        id: check_date
        run: |
          DAY=$(date +%-d)
          # Only apply the date filter if triggered by the schedule
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "$DAY" -lt 15 ] || [ "$DAY" -gt 21 ]; then
              echo "Today is day $DAY, which is not the 3rd Wednesday. Skipping."
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "should_run=true" >> "$GITHUB_OUTPUT"

      - name: Checkout Fork
        if: steps.check_date.outputs.should_run == 'true'
        uses: actions/checkout@v4.2.2 
        with:
          fetch-depth: 0

      - name: Sync Branch and Tags
        if: steps.check_date.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          gh repo sync ${{ github.repository }} --source "fivetran/hybrid_deployment" --branch "main"
          git remote add upstream https://github.com/fivetran/hybrid_deployment.git
          git fetch upstream --tags
          git push origin --tags --force
